<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background-color: transparent;
        overflow: hidden;
        font-family: -apple-system, Arial, sans-serif;
      }
      .stage {
        flex: 1;
        min-height: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: transparent;
      }
      #rive-canvas {
        width: 100%;
        height: 100%;
        max-width: 500px;
        max-height: 500px;
      }
      .controls {
        align-self: center;
        margin-bottom: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 16px;
        padding: 10px 16px;
        border-radius: 16px;
        background-color: rgba(255, 255, 255, 0.95);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow:
          0 6px 20px rgba(0, 0, 0, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }
      .control-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .control-label {
        font-size: 13px;
        color: #555;
      }
      #state-machine-group {
        display: none;
      }
      #state-machine-select {
        padding: 4px 6px;
        font-size: 13px;
        border: 1px solid rgba(0, 0, 0, 0.15);
        border-radius: 6px;
        background-color: #fff;
      }
      .swatches {
        display: flex;
        gap: 10px;
      }
      .bg-swatch {
        width: 22px;
        height: 22px;
        padding: 0;
        border-radius: 50%;
        border: 2px solid transparent;
        cursor: pointer;
        transition: transform 0.1s ease;
      }
      .bg-swatch:hover {
        transform: scale(1.15);
      }
      .bg-swatch.active {
        border-color: #333;
      }
      .bg-swatch.swatch-transparent {
        background-color: #fff;
        background-image:
          linear-gradient(45deg, #ccc 25%, transparent 25%),
          linear-gradient(-45deg, #ccc 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #ccc 75%),
          linear-gradient(-45deg, transparent 75%, #ccc 75%);
        background-size: 10px 10px;
        background-position: 0 0, 0 5px, 5px -5px, -5px 0;
      }
    </style>
  </head>

  <body>
    <div class="stage">
      <canvas id="rive-canvas"></canvas>
    </div>
    <div class="controls">
      <div class="control-group" id="state-machine-group">
        <label class="control-label" for="state-machine-select">State Machine</label>
        <select id="state-machine-select"></select>
      </div>
      <div class="control-group">
        <span class="control-label">Background</span>
        <div class="swatches">
          <button class="bg-swatch swatch-transparent active" data-color="transparent" title="Transparent"></button>
          <button class="bg-swatch" style="background: #6666f6" data-color="#6666f6"></button>
          <button class="bg-swatch" style="background: #6cade2" data-color="#6cade2"></button>
          <button class="bg-swatch" style="background: #52a6ad" data-color="#52a6ad"></button>
          <button class="bg-swatch" style="background: #ed7099" data-color="#ed7099"></button>
          <button class="bg-swatch" style="background: #dfb75d" data-color="#dfb75d"></button>
          <button class="bg-swatch" style="background: #ce5d52" data-color="#ce5d52"></button>
          <button class="bg-swatch" style="background: #787faa" data-color="#787faa"></button>
        </div>
      </div>
    </div>

    <script>
      const stage = document.querySelector(".stage");
      const swatches = document.querySelectorAll(".bg-swatch");
      swatches.forEach((swatch) => {
        swatch.addEventListener("click", () => {
          stage.style.backgroundColor = swatch.dataset.color;
          swatches.forEach((s) => s.classList.remove("active"));
          swatch.classList.add("active");
        });
      });
    </script>

    <!-- Rive renderer, vendored locally under assets/lib and served by the native
         motion:// scheme handler, so it loads instantly and offline with no CDN
         round-trip. The UMD build exposes a global `rive`. -->
    <script src="motion://app/lib/rive.js"></script>
    <script>
      (async () => {
        // Use the vendored WASM binary instead of fetching it from a CDN.
        rive.RuntimeLoader.setWasmUrl("motion://app/lib/rive.wasm");

        const layout = new rive.Layout({
          fit: rive.Fit.FitWidth,
          alignment: rive.Alignment.Center,
        });

        const riveCanvas = document.getElementById("rive-canvas");
        const stateMachineGroup = document.getElementById("state-machine-group");
        const stateMachineSelect = document.getElementById("state-machine-select");

        // The .riv bytes are streamed in by the native scheme handler; nothing is
        // base64-inlined into this document.
        const buffer = await (await fetch("motion://app/data")).arrayBuffer();

        let riveInstance;
        let currentStateMachine;

        function initRive() {
          riveInstance = new rive.Rive({
            buffer,
            canvas: riveCanvas,
            layout,
            autoplay: true,
            onLoad: () => {
              riveInstance.resizeDrawingSurfaceToCanvas();
              updateStateMachinesList();
            },
          });
        }

        function updateStateMachinesList() {
          const stateMachines = riveInstance.stateMachineNames;
          console.log("Available state machines:", stateMachines);

          // Clear existing options
          stateMachineSelect.innerHTML = "";

          // Only show the selector when the file has state machines
          stateMachineGroup.style.display = stateMachines.length > 0 ? "flex" : "none";

          // Add new options
          stateMachines.forEach((stateMachine) => {
            const option = document.createElement("option");
            option.value = stateMachine;
            option.textContent = stateMachine;
            stateMachineSelect.appendChild(option);
          });

          // Select the first state machine by default
          if (stateMachines.length > 0) {
            currentStateMachine = stateMachines[0];
            stateMachineSelect.value = currentStateMachine;
            updateStateMachine();
          }
        }

        function updateStateMachine() {
          if (riveInstance && riveInstance.stateMachineNames.includes(currentStateMachine)) {
            riveInstance.stop(riveInstance.stateMachineNames);
            riveInstance.play(currentStateMachine);
          } else {
            console.error("State machine not found:", currentStateMachine);
          }
        }

        stateMachineSelect.addEventListener("change", (event) => {
          currentStateMachine = event.target.value;
          updateStateMachine();
        });

        initRive();
      })();
    </script>
  </body>
</html>
